                              <div className="text-center bg-slate-950 p-4 rounded-xl border border-slate-800 animate-fade-in">
                                <span className="text-xs text-slate-400 block">選択した回答番号</span>
                                <span className="text-4xl font-black text-amber-400 font-mono block py-1">{myAnswer + 1}</span>
                                <span className="text-xs text-slate-500">早押しタイム: {((myAnswerTime || 0) / 1000).toFixed(3)}s</span>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}

                    {/* 集計割合発表中 */}
                    {gameState.status === 'reveal_poll' && (
                      <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-6 text-center space-y-4 shadow-xl">
                        <BarChart className="w-12 h-12 text-blue-400 mx-auto animate-bounce" />
                        <h3 className="text-xl font-black">回答締め切り！集計割合を発表中...</h3>
                        <p className="text-sm text-slate-400">大画面でみんなの選んだ回答割合を発表しています。</p>
                      </div>
                    )}

                    {/* 正解発表 */}
                    {gameState.status === 'reveal_answer' && currentQuestion && (
                      <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-6 text-center space-y-6 shadow-xl">
                        <h3 className="text-lg font-bold text-slate-400">クイズ正解発表</h3>
                        {isCorrectLocal ? (
                          <div className="space-y-3">
                            <CheckCircle className="w-16 h-16 text-emerald-400 mx-auto animate-bounce" />
                            <h4 className="text-3xl font-black text-emerald-400">見事、正解！</h4>
                            <p className="text-sm text-slate-300">しかし安心はできません。この後の「早押しワースト足切り発表」で最下位になると次回お休みになります。</p>
                          </div>
                        ) : (
                          <div className="space-y-4 bg-slate-950/80 p-6 rounded-2xl border border-blue-500/30">
                            <XCircle className="w-16 h-16 text-amber-500 mx-auto" />
                            <h4 className="text-2xl font-black text-amber-400">おしい！ポイント獲得ならず</h4>
                            <p className="text-sm text-slate-300">
                              あなたの選択: <b className="text-rose-400">{myAnswer !== null ? myAnswer + 1 : "未回答(タイムオーバー)"}</b><br />
                              正解は: <b className="text-emerald-400">{currentQuestion.answer + 1}</b>
                            </p>
                            <p className="text-xs text-emerald-400 font-bold uppercase tracking-wider mt-2">
                              ※回答権は失われません！次の問題もスマホから回答できます。がんばりましょう！
                            </p>
                          </div>
                        )}
                      </div>
                    )}

                    {/* ワースト足切りお休み発表 */}
                    {gameState.status === 'reveal_worst' && (
                      <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-6 text-center space-y-6 shadow-xl">
                        <h3 className="text-xl font-bold">正答者ワースト発表中...</h3>
                        {isEliminated ? (
                          <div className="bg-rose-950/40 border border-rose-500/30 p-6 rounded-2xl animate-pulse space-y-3">
                            <AlertTriangle className="w-12 h-12 text-rose-500 mx-auto" />
                            <h4 className="text-2xl font-black text-rose-500">次回、回答お休み（ロック）</h4>
                            <p className="text-sm text-rose-300">おしい！クイズには正解しましたが、回答が一番遅かったため次回1問のみお休みになります！</p>
                          </div>
                        ) : (
                          <div className="bg-emerald-500/10 border border-emerald-500/30 p-6 rounded-2xl space-y-2">
                            <CheckCircle className="w-5 h-5 text-emerald-400 mx-auto" />
                            <h4 className="text-xl font-black text-emerald-400">サバイバル生存！</h4>
                            <p className="text-sm text-slate-300">クイズに正解し、かつワーストも回避しました！<br />スコアに <b>10 pt</b> が加算されました！</p>
                          </div>
                        )}
                      </div>
                    )}

                    {/* 終了 */}
                    {gameState.status === 'finished' && (
                      <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-8 text-center space-y-4 shadow-xl">
                        <Award className="w-16 h-16 text-yellow-400 mx-auto animate-bounce" />
                        <h3 className="text-2xl font-black">全ての戦いが終了しました！</h3>
                        <p className="text-sm text-slate-400">総合サバイバル成績は大画面でチェック！</p>
                      </div>
                    )}

                  </div>
                )}

              </div>
              <footer className="text-center text-[10px] text-slate-600 py-4">
                © 2026 クイズサバイバル
              </footer>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
