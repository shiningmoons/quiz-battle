  <!-- Firebase SDK Compat版 -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    @keyframes flash {
      0%, 100% { opacity: 1; filter: brightness(1.3); }
      50% { opacity: 0.1; filter: brightness(0.6); }
    }
    .animate-flash {
      animation: flash 0.35s infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
    @keyframes scaleBanner {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-banner {
      animation: scaleBanner 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .scanlines {
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.2) 50%
      );
      background-size: 100% 4px;
    }
    .lcd-number {
      font-family: 'Courier New', Courier, monospace;
      text-shadow: 0 0 12px rgba(234, 179, 8, 0.7);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen select-none scanlines overflow-hidden">

  <div id="root" class="h-full"></div>

  <script type="text/babel" data-presets="env" data-plugins="transform-react-jsx-classic">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // Firebaseの設定
    // ==========================================
    let firebaseApp = null;
    let auth = null;
    let db = null;
    let appId = 'hayaosi-quiz-room-1';
    let isOnlineMode = false;

    try {
      const myCustomConfig = {
        apiKey: "AIzaSyA9qezX-m9XR5sD1kDXr4GaSlIjmYcr1Js",
        authDomain: "hayaosi-quiz-94a65.firebaseapp.com",
        projectId: "hayaosi-quiz-94a65",
        storageBucket: "hayaosi-quiz-94a65.firebasestorage.app",
        messagingSenderId: "938814916805",
        appId: "1:938814916805:web:91538e06e0bd5f329b08ac",
        measurementId: "G-B7BNN9N35D"
      };

      if (window.firebase) {
        firebaseApp = window.firebase.initializeApp(myCustomConfig);
        auth = window.firebase.auth();
        db = window.firebase.firestore();
        appId = 'hayaosi-quiz-room-1';
        isOnlineMode = true;
        console.log("Firebase Online Mode Initialized.");
      } else {
        console.warn("Firebase SDK is missing. Running in Offline Demo Mode.");
      }
    } catch (e) {
      console.error("Firebase Initialization Failed. Switching to Offline Mode.", e);
    }

    const Crown = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7z" /><path d="M5 20h14" />

    const Users = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" />
        <path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />
      </svg>
    );

    const Zap = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
      </svg>
    );

    const RefreshCw = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" />
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
      </svg>
    );

    const CheckCircle = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" />
      </svg>
    );

    const BarChart = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="20" /><line x1="6" y1="20" x2="6" y2="14" />
      </svg>
    );

    const EditIcon = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
      </svg>
    );

    const DEFAULT_QUESTIONS = [

  { id: 1, text: "骨髄において未熟B細胞が自己成分に強く反応するレセプターを発現した際、アポトーシスを回避するために行われる遺伝子再構成のやり直しを何と呼ぶか。", options: ["クローン増殖", "負の選択", "レセプター編集", "クラススイッチ", "アネルギー"], answer: 2 },
  { id: 2, text: "B細胞の活性化において、自然免疫の産物である補体 C3d を認識し、BCRからのシグナルを強力に増強するレセプターはどれか。", options: ["CD40", "CR1（CD35）", "Fc レセプター", "CR2（CD21）", "Toll 様レセプター"], answer: 1 },
  { id: 3, text: "補体系の活性化経路のうち、免疫複合体（抗原＋抗体）によって開始される「古典経路」のトリガーとして最も強力な抗体クラスはどれか。", options: ["IgA", "IgE", "IgM", "IgG4", "IgD"], answer: 2 },
  { id: 4, text: "補体系の活性化において、マグネシウムイオン（Mg2+）を必須とする反応段階はどれか。", options: ["膜傷害複合体（MAC）における C9 の重合", "レクチン経路における MBL と糖鎖の結合", "別経路における C3b と B因子 の結合", "免疫粘着現象における赤血球の捕捉", "古典経路における C1q と抗体の結合"], answer: 2 },
  { id: 5, text: "補体活性化の最終産物である膜傷害複合体（MAC）が最も有効に機能し、菌体を直接破壊（溶菌）を期待できる標的はどれか。", options: ["肺炎レンサ球菌（グラム陽性菌）", "ウイルス粒子（エンベロープなし）", "黄色ブドウ球菌（グラム陽性菌）", "真菌（カビ・酵母）", "髄膜炎菌（グラム陰性菌）"], answer: 4 },
  { id: 6, text: "ナイーブT細胞が抗原提示細胞から「主刺激」を受けた際、同時に「副刺激」を受け取れなかった場合に陥る不可逆的な不応答状態を何というか。", options: ["分化誘導", "アポトーシス", "ネクローシス", "アネルギー", "クラススイッチ"], answer: 3 },
  { id: 7, text: "細胞傷害性T細胞（Tc細胞）やNK細胞が標的細胞にアポトーシスを誘導する際、細胞膜に管状の穴を開ける蛋白質はどれか。", options: ["Fas リガンド", "デフェンシン", "リゾチーム", "グランザイム", "パーフォリン"], answer: 4 },
  { id: 8, text: "Th1細胞が産生し、マクロファージを「M1型」へ活性化させて殺菌能を飛躍的に高める中心的なサイトカインはどれか。", options: ["IL−17", "TNF−α", "IL−10", "IL−4", "IFN−γ（インターフェロン・ガンマ）"], answer: 4 },
  { id: 9, text: "抗原提示細胞から IL−12 の刺激を受けたナイーブT細胞が分化し、細胞性免疫を指揮するようになるサブセットはどれか。", options: ["制御性T細胞（Treg）", "Th1細胞", "形質細胞", "Th2細胞", "Th17細胞"], answer: 1 },
  { id: 10, text: "サイトカインの作用機構のうち、産生された物質が血流に乗って遠隔の臓器や細胞に作用する形式を何というか。", options: ["オートクライン（自己分泌）", "ジャクスタクライン（遠隔分泌）", "エクソクライン（外分泌）", "パラクライン（傍分泌）", "エンドクライン（内分泌）"], answer: 4 },
  { id: 11, text: "肝臓において、IL−6 等の刺激により合成が著しく亢進し、病原体に結合してオプソニンとして働く蛋白質はどれか。", options: ["アルブミン", "ヘモグロビン", "IgM", "トランスフェリン", "C 反応性蛋白（CRP）"], answer: 4 },
  { id: 12, text: "不完全抗原（ハプテン）が免疫原性を獲得するために必要な条件はどれか。", options: ["ウイルスのエンベロープ脂質を付加すること。", "56℃で30分間加熱し、非働化すること。", "赤血球表面の CR1 レセプターに吸着させること。", "強酸または強アルカリで処理し、変性させること。", "分子量の大きい「キャリア（担体）」と結合すること。"], answer: 4 },
  { id: 13, text: "毒蛇の咬傷や破傷風の毒素に対し、他者や動物で作られた抗体を投与して即効性のある防御を得る方法を何というか。", options: ["受動免疫", "細胞性免疫", "能動免疫", "アジュバント効果", "自然免疫"], answer: 0 },
  { id: 14, text: "補体系の「レクチン経路」において、非自己（細菌等）の認識の目印となる糖鎖はどれか。", options: ["グリコーゲン", "ヒアルロン酸", "マンノース", "シアル酸", "ガラクトース"], answer: 2 },
  { id: 15, text: "成熟ナイーブB細胞の細胞表面に共発現している免疫グロブリンの組み合わせはどれか。", options: ["膜型 IgM と膜型 IgG", "膜型 IgM と膜型 IgD", "分泌型 IgA と膜型 IgM", "膜型 IgD と膜型 IgE", "膜型 IgA と膜型 IgG"], answer: 1 },
  { id: 16, text: "補体成分C3の活性化を阻害、あるいは分解を促進する調節因子(インヒビター)はどれか。", options: ["C1q", "B 因子", "プロパージン", "D 因子", "H 因子"], answer: 4 },
  { id: 17, text: "補体系の活性化において、Ca2+(カルシウムイオン)が必須となるステップはどれか。", options: ["レクチン経路におけるC3の分解", "C1複合体(C1q,C1r,C1s)の安定化と形成", "副経路におけるB因子の結合", "膜傷害複合体(MAC)の細胞膜への挿入", "C3転換酵素によるC3の分解"], answer: 1 }

    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [hasJoined, setHasJoined] = useState(false);
      const [isMuted, setIsMuted] = useState(false);

      const [questions, setQuestions] = useState(DEFAULT_QUESTIONS);
      
      const [isEditingQuestions, setIsEditingQuestions] = useState(false);
      const [selectedEditIndex, setSelectedEditIndex] = useState(0);
      const [editQuestionText, setEditQuestionText] = useState('');
      const [editOptions, setEditOptions] = useState(["", "", "", "", ""]);
      const [editAnswerIndex, setEditAnswerIndex] = useState(0);

      const [gameState, setGameState] = useState({
        status: 'lobby', 
        currentQIndex: 0,
        questionStartTime: null,
      });
      const [players, setPlayers] = useState([]);
      const [answers, setAnswers] = useState([]);

      const [hasAnswered, setHasAnswered] = useState(false);
      const [myAnswer, setMyAnswer] = useState(null);
      const [myAnswerTime, setMyAnswerTime] = useState(null);
      const [isCorrectLocal, setIsCorrectLocal] = useState(false);

      const [timeLeft, setTimeLeft] = useState(15.00);

      const [revealStage, setRevealStage] = useState('idle');
      const [visibleLosers, setVisibleLosers] = useState([]);
      const [countdownNum, setCountdownNum] = useState(3);
      const [worstPlayer, setWorstPlayer] = useState(null);
      const [fastestPlayer, setFastestPlayer] = useState(null);

      const [isFlashingActive, setIsFlashingActive] = useState(false);
      const flashTimeoutRef = useRef(null);

      const [revealRankIndex, setRevealRankIndex] = useState(-1);
      const [revealRankingActive, setRevealRankActive] = useState(false);

      const prevStatusRef = useRef(null);
      const prevQIndexRef = useRef(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roleParam = params.get('role');
        if (roleParam === 'player') {
          setRole('player');
        }
      }, []);

      const playSound = (type) => {
        if (isMuted) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'click') {
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          } else if (type === 'drumroll') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, ctx.currentTime);
            for (let i = 0; i < 20; i++) {
              osc.frequency.setValueAtTime(120 + Math.random() * 60, ctx.currentTime + i * 0.04);
            }
            gain.gain.setValueAtTime(0.18, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
            osc.start();
            osc.stop(ctx.currentTime + 0.8);
          } else if (type === 'gong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(125, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(45, ctx.currentTime + 1.4);
            gain.gain.setValueAtTime(0.25, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);
            osc.start();
            osc.stop(ctx.currentTime + 1.4);
          } else if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
            osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            osc.start();
            osc.stop(ctx.currentTime + 0.35);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(170, ctx.currentTime);
            osc.frequency.setValueAtTime(130, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            osc.start();
            osc.stop(ctx.currentTime + 0.35);
          } else if (type === 'countdown') {
            osc.frequency.setValueAtTime(580, ctx.currentTime);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
            osc.start();
            osc.stop(ctx.currentTime + 0.12);
          } else if (type === 'timeup') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(95, ctx.currentTime);
            gain.gain.setValueAtTime(0.25, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
            osc.start();
            osc.stop(ctx.currentTime + 0.7);
          }
        } catch (e) {
          console.warn("Audio Context blocked.");
        }
      };

      // 認証（匿名認証）
      useEffect(() => {
        if (!isOnlineMode) {
          setUser({ uid: 'offline-local-user-id' });
          const savedName = localStorage.getItem('early_quiz_player_name');
          if (savedName) setPlayerName(savedName);
          return;
        }

        const initAuth = async () => {
          try {
            await auth.signInAnonymously();
          } catch (error) {
            console.error("Auth failed", error);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((u) => {
          if (u) {
            setUser(u);
            const savedName = localStorage.getItem('early_quiz_player_name');
            if (savedName) setPlayerName(savedName);
          }
        });
        return () => unsubscribe();
      }, []);

      // データ同期
      useEffect(() => {
        if (!user || !isOnlineMode) return;

        const gameStateDocRef = db.doc(`artifacts/${appId}/public/data/game_state/current`);
        const unsubGameState = gameStateDocRef.onSnapshot((snap) => {
          if (snap.exists) setGameState(snap.data());
          else gameStateDocRef.set({ status: 'lobby', currentQIndex: 0, questionStartTime: null });
        });

        const customQuestionsDocRef = db.doc(`artifacts/${appId}/public/data/questions/custom`);
        const unsubQuestions = customQuestionsDocRef.onSnapshot((snap) => {
          if (snap.exists) { const d = snap.data(); if (d?.list) setQuestions(d.list); }
          else customQuestionsDocRef.set({ list: DEFAULT_QUESTIONS });
        });

        const playersColRef = db.collection(`artifacts/${appId}/public/data/players`);
        const unsubPlayers = playersColRef.onSnapshot((snap) => {
          const plist = [];
          snap.forEach((d) => { if (d.data()) plist.push({ id: d.id, ...d.data() }); });
          plist.sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));
          setPlayers(plist);
        });

        const answersColRef = db.collection(`artifacts/${appId}/public/data/answers`);
        const unsubAnswers = answersColRef.onSnapshot((snap) => {
          const alist = [];
          snap.forEach((d) => { if (d.data()) alist.push({ id: d.id, ...d.data() }); });
          setAnswers(alist);
        });

        return () => {
          unsubGameState();
          unsubQuestions();
          unsubPlayers();
          unsubAnswers();
        };
      }, [user]);

      // タイマー
      useEffect(() => {
        if (gameState.status !== 'reading_answering' || !gameState.questionStartTime) {
          setTimeLeft(15.00);
          return;
        }

        let isTimeUpCalled = false;
        const interval = setInterval(() => {
          const elapsed = Date.now() - gameState.questionStartTime;
          const remaining = Math.max(0, 15 - elapsed / 1000);
          setTimeLeft(remaining);

          const integerPart = Math.floor(remaining);
          if (integerPart > 0 && integerPart <= 5 && Math.abs((remaining % 1) - 0.9) < 0.05) {
            playSound('countdown');
          }

          if (remaining <= 0) {
            clearInterval(interval);
            if (!isTimeUpCalled) {
              isTimeUpCalled = true;
              playSound('timeup');
              if (role === 'host') stopAnsweringAndShowPoll();
            }
          }
        }, 50);

        return () => clearInterval(interval);
      }, [gameState.status, gameState.questionStartTime, role]);

      // 演出ステージをデータベースおよび全端末に同期送信するヘルパー関数
      const syncRevealStage = async (stage) => {
        setRevealStage(stage);
        if (isOnlineMode) {
          try {
            await db.doc(`artifacts/${appId}/public/data/game_state/current`).update({ revealStage: stage });
          } catch (e) {
            console.error("revealStage sync error:", e);
          }
        } else {
          setGameState(prev => ({ ...prev, revealStage: stage }));
        }
      };

      // 点滅タイマー
      useEffect(() => {
        if (flashTimeoutRef.current) clearTimeout(flashTimeoutRef.current);
        setIsFlashingActive(false);

        if (gameState.status === 'reveal_answer') {
          setIsFlashingActive(true);
          flashTimeoutRef.current = setTimeout(() => setIsFlashingActive(false), 2000);
        }
      }, [gameState.status]);

      useEffect(() => {
        if (gameState.status === 'reveal_worst' && revealStage === 'showing_worst') {
          setIsFlashingActive(true);
          if (flashTimeoutRef.current) clearTimeout(flashTimeoutRef.current);
          flashTimeoutRef.current = setTimeout(() => setIsFlashingActive(false), 2000);
        }
      }, [gameState.status, revealStage]);

      // ステート同期
      useEffect(() => {
        const statusChanged = prevStatusRef.current !== gameState.status;
        const qIndexChanged = prevQIndexRef.current !== gameState.currentQIndex;

        if (statusChanged || qIndexChanged) {
          if (gameState.status === 'reading_answering') {
            setHasAnswered(false);
            setMyAnswer(null);
            setMyAnswerTime(null);
            setIsCorrectLocal(false);
            setRevealStage('idle');
            setVisibleLosers([]);
            setWorstPlayer(null);
            setFastestPlayer(null);
          }
          prevStatusRef.current = gameState.status;
          prevQIndexRef.current = gameState.currentQIndex;
        }

        if (gameState.status === 'reveal_answer') {
          const currentQ = questions[gameState.currentQIndex];
          const myAnsObj = answers.find(a => a.playerId === user?.uid);
          if (myAnsObj && currentQ) {
            const isCorrect = Number(myAnsObj.selectedOption) === Number(currentQ.answer);
            setIsCorrectLocal(isCorrect);
            playSound(isCorrect ? 'correct' : 'wrong');
          } else {
            setIsCorrectLocal(false);
            playSound('wrong');
          }
        }
        
        if (gameState.status === 'reveal_worst') {
          calculateWorstCorrectAndTriggerPresentation();
        }
      }, [gameState.status, gameState.currentQIndex, questions, answers, user]);

      const calculateWorstCorrectAndTriggerPresentation = () => {
        if (!players || players.length === 0) return;
        const currentQ = questions[gameState.currentQIndex];
        if (!currentQ) return;

        const correctAnswers = answers.filter(ans => ans && Number(ans.selectedOption) === Number(currentQ.answer));
        if (correctAnswers.length === 0) {
          setWorstPlayer(null); setFastestPlayer(null); setRevealStage('idle'); return;
        }

        const correctPlayersList = correctAnswers.map(ans => {
          const pInfo = players.find(p => p.id === ans.playerId);
          return { id: ans.playerId, name: ans.playerName || pInfo?.name || 'ゲスト', time: Number(ans.time) || 15000 };
        });

        // 昇順（タイムが小さい＝速い順）に確実にソート！
        correctPlayersList.sort((a, b) => a.time - b.time);
        
        const fastest = correctPlayersList[0];
        const worst = correctPlayersList.length > 1 ? correctPlayersList[correctPlayersList.length - 1] : null;

        setFastestPlayer(fastest);
        setWorstPlayer(worst);

        const sortedDelay = [...correctPlayersList].reverse();
        const worstTenExcludingFirst = sortedDelay.slice(0, 10);
        triggerWorstAnimationSequence(worstTenExcludingFirst, worst);
      };

      const triggerWorstAnimationSequence = (losersToShow, worst) => {
        syncRevealStage('showing_losers');
        setVisibleLosers([]);
        playSound('drumroll');

        let index = 0;
        const interval = setInterval(() => {
          if (index < losersToShow.length) {
            const nextLoser = losersToShow[index];
            if (nextLoser) setVisibleLosers(prev => [...prev, nextLoser]);
            playSound('click');
            index++;
          } else {
            clearInterval(interval);
            syncRevealStage('waiting_worst');
            setCountdownNum(3);
            
            let count = 3;
            const countdownInterval = setInterval(() => {
              count--;
              setCountdownNum(count);
              playSound('countdown');
              if (count === 0) {
                clearInterval(countdownInterval);
                syncRevealStage('showing_worst');
                playSound('gong');
              }
            }, 1000);
          }
        }, 600);
      };

      const joinGame = async (e) => {
        e.preventDefault();
        if (!playerName.trim() || !user) return;
        localStorage.setItem('early_quiz_player_name', playerName);

        if (isOnlineMode) {
          await db.doc(`artifacts/${appId}/public/data/players/${user.uid}`).set({ name: playerName, score: 0, joinedAt: Date.now() });
        } else {
          const newPlayer = { id: user.uid, name: playerName, score: 0, joinedAt: Date.now() };
          setPlayers(prev => [newPlayer, ...prev.filter(p => p.id !== user.uid)]);
        }
        setHasJoined(true);
        playSound('click');
      };

      const handleAnswerSelect = async (optionIndex) => {
        if (hasAnswered || gameState.status !== 'reading_answering' || !user || timeLeft <= 0) return;

        const answerTime = Date.now() - (gameState.questionStartTime || Date.now());
        setHasAnswered(true);
        setMyAnswer(optionIndex);
        setMyAnswerTime(answerTime);
        playSound('click');

        const currentQ = questions[gameState.currentQIndex];
        if (isOnlineMode) {
          await db.doc(`artifacts/${appId}/public/data/answers/${user.uid}`).set({
            playerId: user.uid, playerName: playerName, selectedOption: optionIndex, time: answerTime, isCorrect: optionIndex === currentQ?.answer, timestamp: Date.now()
          });
        } else {
          const newAns = { id: user.uid, playerId: user.uid, playerName: playerName, selectedOption: optionIndex, time: answerTime, isCorrect: optionIndex === currentQ?.answer };
          setAnswers(prev => [newAns, ...prev.filter(a => a.playerId !== user.uid)]);
        }
      };

      const openQuestionEditor = () => {
        playSound('click');
        setIsEditingQuestions(true);
        loadQuestionToEdit(0);
      };

      const loadQuestionToEdit = (index) => {
        setSelectedEditIndex(index);
        const q = questions[index];
        if (q) {
          setEditQuestionText(q.text || '');
          setEditOptions(q.options ? [...q.options] : ["", "", "", "", ""]);
          setEditAnswerIndex(q.answer !== undefined ? q.answer : 0);
        }
      };

      const saveSelectedEdit = () => {
        const updated = [...questions];
        updated[selectedEditIndex] = {
          id: selectedEditIndex + 1,
          text: editQuestionText,
          options: [...editOptions],
          answer: editAnswerIndex
        };
        setQuestions(updated);
        playSound('click');
      };

      const saveAllQuestionsToCloud = async () => {
        const updated = [...questions];
        updated[selectedEditIndex] = {
          id: selectedEditIndex + 1,
          text: editQuestionText,
          options: [...editOptions],
          answer: editAnswerIndex
        };

        if (isOnlineMode) {
          try {
            const customQuestionsDocRef = db.doc(`artifacts/${appId}/public/data/questions/custom`);
            await customQuestionsDocRef.set({ list: updated });
            playSound('correct');
          } catch (e) {
            console.error(e);
          }
        } else {
          setQuestions(updated);
          playSound('correct');
        }
        setIsEditingQuestions(false);
      };

      const resetGame = async () => {
        playSound('gong');
        setRevealStage('idle');
        setRevealRankActive(false);
        setRevealRankIndex(-1);

        if (isOnlineMode) {
          const batch = db.batch();
          batch.set(db.doc(`artifacts/${appId}/public/data/game_state/current`), { status: 'lobby', currentQIndex: 0, questionStartTime: null, revealStage: 'idle' });
          
          const playersSnap = await db.collection(`artifacts/${appId}/public/data/players`).get();
          playersSnap.forEach((d) => batch.delete(d.ref));
          
          const answersSnap = await db.collection(`artifacts/${appId}/public/data/answers`).get();
          answersSnap.forEach((d) => batch.delete(d.ref));
          
          await batch.commit();
        } else {
          setGameState({ status: 'lobby', currentQIndex: 0, questionStartTime: null, revealStage: 'idle' });
          setPlayers([
            { id: 'offline-local-user-id', name: 'あなた（ゲスト）', score: 0 },
            { id: 'demo-p1', name: 'たろう', score: 20 },
            { id: 'demo-p2', name: 'はなこ', score: 10 },
            { id: 'demo-p3', name: 'けんた', score: 30 }
          ]);
          setAnswers([]);
        }
      };

      const addMockPlayers = async () => {
        const firstNames = ["佐藤", "鈴木", "高橋", "田中", "渡辺", "伊藤", "山本", "中村", "小林", "加藤"];
        const lastNames = ["たかし", "ゆうた", "しょーた", "まい", "ゆい", "ひな", "れん", "さくら", "たくや", "みさき"];
        
        const generated = [];
        for (let i = 0; i < 30; i++) {
          const mockId = `mock_user_${Date.now()}_${i}`;
          const mockName = `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;
          generated.push({
            id: mockId,
            name: `${mockName}`, 
            score: Math.floor(Math.random() * 5) * 10,
            joinedAt: Date.now() + i,
            isMock: true
          });
        }

        if (isOnlineMode) {
          const batch = db.batch();
          generated.forEach(p => {
            batch.set(db.doc(`artifacts/${appId}/public/data/players/${p.id}`), p);
          });
          await batch.commit();
        } else {
          setPlayers(prev => [
            { id: 'offline-local-user-id', name: playerName || 'あなた（ゲスト）', score: 0 },
            ...generated
          ]);
        }
        playSound('click');
      };

      const clearMockPlayers = async () => {
        if (isOnlineMode) {
          const batch = db.batch();
          players.forEach((p) => {
            if (p?.isMock) batch.delete(db.doc(`artifacts/${appId}/public/data/players/${p.id}`));
          });
          await batch.commit();
        } else {
          setPlayers(prev => prev.filter(p => !p.isMock || p.id === 'offline-local-user-id'));
        }
        playSound('click');
      };

      const startQuestion = async () => {
        playSound('click');
        if (isOnlineMode) {
          const batch = db.batch();
          const answersSnap = await db.collection(`artifacts/${appId}/public/data/answers`).get();
          answersSnap.forEach((d) => batch.delete(d.ref));
          
          const nextIdx = gameState.status === 'lobby' ? 0 : gameState.currentQIndex + 1;
          if (nextIdx >= questions.length) {
            await db.doc(`artifacts/${appId}/public/data/game_state/current`).update({ status: 'finished', revealStage: 'idle' });
          } else {
            batch.update(db.doc(`artifacts/${appId}/public/data/game_state/current`), {
              status: 'reading_answering',
              currentQIndex: nextIdx,
              questionStartTime: Date.now(),
              revealStage: 'idle'
            });
          }
          await batch.commit();
        } else {
          setAnswers([]);
          const nextIdx = gameState.status === 'lobby' ? 0 : gameState.currentQIndex + 1;
          if (nextIdx >= questions.length) setGameState(prev => ({ ...prev, status: 'finished', revealStage: 'idle' }));
          else setGameState({ status: 'reading_answering', currentQIndex: nextIdx, questionStartTime: Date.now(), revealStage: 'idle' });
        }
      };

      const stopAnsweringAndShowPoll = async () => {
        if (isOnlineMode) await db.doc(`artifacts/${appId}/public/data/game_state/current`).update({ status: 'reveal_worst', revealStage: 'showing_losers' });
        else setGameState(prev => ({ ...prev, status: 'reveal_worst', revealStage: 'showing_losers' }));
      };

      const revealAnswer = async () => {
        playSound('correct');
        if (isOnlineMode) await db.doc(`artifacts/${appId}/public/data/game_state/current`).update({ status: 'reveal_answer' });
        else setGameState(prev => ({ ...prev, status: 'reveal_answer' }));
      };

      // 配点システム（最速15pt / 通常10pt / ワースト1pt）の厳密な加算処理
      const revealWorstAndDistributePoints = async () => {
        const currentQ = questions[gameState.currentQIndex];
        if (!currentQ) return;
        const correctAnswers = answers.filter(ans => ans && Number(ans.selectedOption) === Number(currentQ.answer));
        
        // 正解者をタイム順（昇順：a.time - b.time）に確実にソート！
        const sortedCorrect = [...correctAnswers].sort((a, b) => (Number(a.time) || 0) - (Number(b.time) || 0));
        
        const fastestId = sortedCorrect.length > 0 ? sortedCorrect[0]?.playerId : null;
        const worstId = sortedCorrect.length > 1 ? sortedCorrect[sortedCorrect.length - 1]?.playerId : null;

        if (isOnlineMode) {
          const batch = db.batch();
          for (const p of players) {
            if (p?.id) {
              const isCorrect = correctAnswers.some(ans => ans.playerId === p.id);
              const isFastest = p.id === fastestId;
              const isWorst = p.id === worstId;
              const pDocRef = db.doc(`artifacts/${appId}/public/data/players/${p.id}`);

              let ptsToAdd = 0;
              if (isCorrect) {
                if (isFastest) {
                  ptsToAdd = 15;
                } else if (isWorst) {
                  ptsToAdd = 1;
                } else {
                  ptsToAdd = 10;
                }
              }

              const currentScore = Number(p.score) || 0;
              batch.update(pDocRef, { score: currentScore + ptsToAdd });
            }
          }
          await batch.commit();
        } else {
          setPlayers(prev => prev.map(p => {
            const isCorrect = correctAnswers.some(ans => ans.playerId === p.id);
            const isFastest = p.id === fastestId;
            const isWorst = p.id === worstId;

            let ptsToAdd = 0;
            if (isCorrect) {
              if (isFastest) ptsToAdd = 15;
              else if (isWorst) ptsToAdd = 1;
              else ptsToAdd = 10;
            }
            return { ...p, score: (Number(p.score) || 0) + ptsToAdd };
          }));
        }

        if (isOnlineMode) await db.doc(`artifacts/${appId}/public/data/game_state/current`).update({ status: 'reveal_worst' });
        else setGameState(prev => ({ ...prev, status: 'reveal_worst' }));
      };

      const simulateMockAnswering = () => {
        if (gameState.status !== 'reading_answering') return;
        const currentQ = questions[gameState.currentQIndex];
        if (!currentQ) return;
        const generatedAnswers = [];
        players.forEach((p) => {
          if (p?.isMock) {
            const simulatedTime = Math.floor(250 + Math.random() * 14500); 
            const selectCorrect = Math.random() < 0.70;
            const selectedOption = selectCorrect ? currentQ.answer : (currentQ.answer + 1) % 5;
            generatedAnswers.push({ playerId: p.id, playerName: p.name || '', selectedOption: selectedOption, time: simulatedTime, isCorrect: selectedOption === currentQ.answer, timestamp: Date.now() });
          }
        });
        if (isOnlineMode) {
          const batch = db.batch();
          generatedAnswers.forEach(ans => batch.set(db.doc(`artifacts/${appId}/public/data/answers/${ans.playerId}`), ans));
          batch.commit();
        } else {
          setAnswers(prev => [...generatedAnswers, ...prev.filter(a => !generatedAnswers.some(g => g.playerId === a.playerId))]);
        }
      };

      const startRankReveal = () => {
        if (players.length === 0) return;
        playSound('gong');
        setRevealRankActive(true);
        const totalToReveal = Math.min(30, players.length);
        setRevealRankIndex(totalToReveal - 1);
      };

      const revealNextRank = () => {
        if (revealRankIndex > 0) {
          setRevealRankIndex(prev => prev - 1);
          playSound('drumroll');
        } else if (revealRankIndex === 0) {
          setRevealRankIndex(-1);
          playSound('gong');
        }
      };

      const getPlayerButtonClass = (oIdx, isSelected, anySelected, disabled) => {
        if (isSelected) {
          return 'bg-gradient-to-b from-amber-400 to-yellow-500 text-slate-950 scale-90 translate-y-[6px] shadow-[0_1px_0_#78350f,0_0_25px_rgba(245,158,11,1)] border-white ring-4 ring-amber-400/50';
        }
        if (disabled || anySelected) {
          return 'bg-slate-900 border-slate-800 text-slate-700 opacity-30 scale-95 shadow-none pointer-events-none';
        }
        
        switch (oIdx) {
          case 0: return 'bg-gradient-to-b from-blue-500 to-blue-800 shadow-[0_5px_0_#1e3a8a] text-white border-slate-300/30 hover:scale-105 active:scale-95';
          case 1: return 'bg-gradient-to-b from-red-500 to-red-800 shadow-[0_5px_0_#991b1b] text-white border-slate-300/30 hover:scale-105 active:scale-95';
          case 2: return 'bg-gradient-to-b from-emerald-500 to-emerald-800 shadow-[0_5px_0_#065f46] text-white border-slate-300/30 hover:scale-105 active:scale-95';
          case 3: return 'bg-gradient-to-b from-yellow-400 to-yellow-600 shadow-[0_5px_0_#854d0e] text-white border-slate-300/30 hover:scale-105 active:scale-95';
          case 4: return 'bg-gradient-to-b from-purple-500 to-purple-800 shadow-[0_5px_0_#581c87] text-white border-slate-300/30 hover:scale-105 active:scale-95';
          default: return '';
        }
      };

      const timerPercentage = (timeLeft / 15) * 100;
      const getTimerColorClass = () => {
        if (timeLeft > 7) return 'bg-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.7)]';
        if (timeLeft > 3.5) return 'bg-amber-500 shadow-[0_0_20px_rgba(245,158,11,0.7)]';
        return 'bg-rose-600 shadow-[0_0_25px_rgba(225,29,72,0.9)] animate-pulse';
      };

      const currentQuestion = questions[gameState.currentQIndex] || null;

      // 1. 初期画面
      if (!role) {
        return (
          <div className="min-h-screen bg-slate-950 flex flex-col justify-center items-center p-4 scanlines select-none overflow-hidden relative">
            <button 
              onClick={() => { setRole('host'); playSound('click'); }}
              className="absolute top-4 right-4 text-slate-800 hover:text-amber-500/80 p-2.5 rounded-full transition-all duration-300 hover:scale-110 active:scale-95 z-50 bg-slate-900/50 border border-slate-800"
              title="管理者ログイン"
            >
              <Crown className="w-6 h-6" />
            </button>

            <div className="bg-slate-900/90 border-2 border-slate-800 rounded-3xl p-6 md:p-12 text-center space-y-8 shadow-2xl max-w-md w-full animate-fade-in">
              <div className="space-y-4">
                <span className="bg-blue-600/20 border-2 border-blue-400/40 text-blue-300 px-4 py-1.5 rounded-full text-xs font-bold tracking-wider inline-block">ALLSTAR CHAMPIONSHIP</span>
                <h2 className="text-3xl md:text-4xl font-black tracking-tight leading-none text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-amber-500">免疫学<br />クイズバトル！</h2>
                <p className="text-slate-400 text-xs md:text-sm leading-relaxed">
                  早押し15秒の真剣勝負！最速正解者は15pt！最遅正解者は1pt！<br />
                  獲得ポイントを競うバトル！
                </p>
              </div>

              <div className="w-full">
                <button 
                  onClick={() => { setRole('player'); playSound('click'); }} 
                  className="w-full bg-gradient-to-br from-blue-600 to-indigo-800 hover:from-blue-500 hover:to-indigo-700 text-white p-5 rounded-2xl text-center space-y-2 transition-all hover:scale-[1.02] border border-blue-400 shadow-[0_0_15px_rgba(30,58,138,0.4)]"
                >
                  <div className="bg-white/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2">
                    <Users className="w-5 h-5 text-blue-300" />
                  </div>
                  <h4 className="text-base font-black text-slate-100">プレイヤーとして参戦</h4>
                  <p className="text-[11px] text-slate-300 leading-normal">ニックネームを入力して<br />スマホからクイズに参加！</p>
                </button>
              </div>
            </div>
          </div>
        );
      }

      // 2. プレイヤー画面
      if (role === 'player') {
        const anySelected = myAnswer !== null;

        return (
          <div className="fixed inset-0 bg-slate-950 p-3 z-50 overflow-hidden flex flex-col justify-between animate-fade-in scanlines">
            <div className="max-w-md w-full mx-auto flex flex-col justify-between h-full space-y-2">
              
              {!hasJoined ? (
                <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-6 shadow-2xl space-y-6 mt-10">
                  <div className="text-center space-y-2">
                    <Users className="w-12 h-12 text-blue-400 mx-auto" />
                    <h3 className="text-xl font-black">プレイヤーエントリー</h3>
                    <p className="text-sm text-slate-400">クイズ大会で使用するニックネームを入力してください。</p>
                  </div>
                  <form onSubmit={joinGame} className="space-y-4">
                    <input type="text" required maxLength={15} placeholder="例：早押し名人" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all font-bold text-lg" />
                    <button type="submit" className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-xl text-base font-black tracking-wider shadow-lg">サバイバルにエントリー</button>
                  </form>
                </div>
              ) : (
                <div className="flex flex-col justify-between h-full space-y-2">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-2 flex justify-between items-center text-xs font-bold shrink-0">
                    <span className="flex items-center gap-1 truncate max-w-[120px]"><Users className="w-3.5 h-3.5 text-emerald-400" />{playerName}</span>
                    <span className="bg-slate-950 px-3 py-1 rounded-full text-amber-400 font-mono">得点: {players.find(p => p.id === user?.uid)?.score || 0} pt</span>
                  </div>

                  <div className="flex-grow flex flex-col justify-center overflow-hidden">
                    {gameState.status === 'lobby' && (
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 text-center space-y-3">
                        <div className="animate-spin text-blue-400 inline-block"><RefreshCw className="w-8 h-8" /></div>
                        <h3 className="text-sm font-black text-slate-300">ホストの出題を待っています...</h3>
                        <p className="text-[10px] text-slate-400">大画面を見ながら少々お待ちください。</p>
                      </div>
                    )}

                    {gameState.status === 'reading_answering' && currentQuestion && (
                      <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-3 shadow-xl flex flex-col justify-between max-h-[80vh] space-y-3 overflow-hidden">
                        <div className="inline-block bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 font-mono mx-auto self-center shrink-0">
                          <span className="text-[8px] text-slate-400 block text-center">残り時間</span>
                          <span className={`text-xl font-black ${timeLeft <= 3 ? 'text-rose-500 animate-ping' : 'text-white'}`}>{timeLeft.toFixed(2)}s</span>
                        </div>

                        <div className="bg-slate-950/90 border border-slate-800 rounded-xl p-2.5 text-left space-y-1.5 max-h-[150px] overflow-y-auto no-scrollbar shrink-0">
                          <p className="text-[11px] font-black text-yellow-100 leading-snug border-b border-slate-800/60 pb-1 shrink-0">
                            Q{gameState.currentQIndex + 1}: {currentQuestion.text}
                          </p>
                          <div className="space-y-1 text-[10px] text-slate-300 font-medium">
                            {currentQuestion.options.map((opt, idx) => (
                              <div 
                                key={idx} 
                                className={`p-1 rounded flex items-center gap-1.5 transition-all ${
                                  myAnswer === idx 
                                    ? 'bg-amber-500/25 text-amber-300 font-bold border border-amber-500/30' 
                                    : 'border border-transparent'
                                }`}
                              >
                                <span className="w-4 h-4 rounded-full bg-slate-900 text-slate-400 flex items-center justify-center text-[9px] font-black shrink-0">
                                  {idx + 1}
                                </span>
                                <span className="truncate">{opt}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                        
                        <h3 className="text-[10px] font-black tracking-wide text-slate-400 text-center shrink-0">正しい番号をタップしてください！</h3>

                        <div className="flex justify-center items-center gap-1.5 max-w-sm mx-auto py-1.5 shrink-0">
                          {[0, 1, 2, 3, 4].map((oIdx) => {
                            const isSelected = myAnswer === oIdx;
                            const isKeypadDisabled = hasAnswered || timeLeft <= 0;

                            return (
                              <button 
                                key={oIdx} 
                                onClick={() => handleAnswerSelect(oIdx)} 
                                disabled={isKeypadDisabled} 
                                className={`w-12 h-12 rounded-full border-4 font-black text-lg transition-all flex items-center justify-center shadow-md ${getPlayerButtonClass(oIdx, isSelected, anySelected, isKeypadDisabled)}`}
                              >
                                {oIdx + 1}
                              </button>
                            );
                          })}
                        </div>

                        {hasAnswered && myAnswer !== null && (
                          <div className="bg-slate-950 p-2 rounded-lg border border-slate-800 text-[10px] flex justify-between items-center px-4 shrink-0">
                            <span className="text-slate-400 font-bold">送信キー: <b className="text-amber-400 text-sm font-mono">{myAnswer + 1}</b></span>
                            <span className="text-slate-500 font-mono">Time: {((myAnswerTime || 0)/1000).toFixed(3)}s</span>
                          </div>
                        )}
                      </div>
                    )}

                    {gameState.status === 'reveal_poll' && (
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center space-y-2">
                        <BarChart className="w-10 h-10 text-blue-400 mx-auto animate-bounce" />
                        <h3 className="text-sm font-black">回答締め切り！</h3>
                        <p className="text-[11px] text-slate-400">プロジェクター大画面で回答比率をチェック！</p>
                      </div>
                    )}

                    {/* 正解発表フェーズ：ここではまだ獲得ポイント結果を出さず、プロジェクター待機を案内 */}
                    {gameState.status === 'reveal_answer' && currentQuestion && (
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center space-y-3">
                        <h4 className="text-xs font-bold text-slate-400">アンサーチェック結果</h4>
                        {isCorrectLocal ? (
                          <div className="space-y-1">
                            <CheckCircle className="w-12 h-12 text-emerald-400 mx-auto animate-bounce" />
                            <h4 className="text-xl font-black text-emerald-400">見事、正解！</h4>
                            <p className="text-[11px] text-slate-300">プロジェクター画面での「タイム集計（STEP 4）」をお待ちください！</p>
                          </div>
                        ) : (
                          <div className="bg-slate-950 p-3 rounded-xl border border-blue-500/20 space-y-1">
                            <h4 className="text-lg font-black text-amber-400">不正解</h4>
                            <p className="text-[11px] text-slate-300">
                              あなたの選択: <b className="text-rose-400">{myAnswer !== null ? myAnswer + 1 : "未回答(タイムオーバー)"}</b><br />
                              正解は: <b className="text-emerald-400">{currentQuestion.answer + 1}</b>
                            </p>
                          </div>
                        )}
                      </div>
                    )}

                    {/* ポイント確定フェーズ（STEP 4: reveal_worst）：クラウドから同期される revealStage が 'showing_worst' に達した瞬間にポイント結果を開封 */}
                    {gameState.status === 'reveal_worst' && (
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center space-y-3 animate-fade-in">
                        <h4 className="text-xs font-bold text-slate-400">早押し集計 ＆ ポイント結果</h4>
                        
                        {(gameState.revealStage || revealStage) !== 'showing_worst' ? (
                          <div className="bg-slate-950 p-5 rounded-xl space-y-2 border border-slate-800">
                            <div className="animate-spin text-amber-400 inline-block">
                              <RefreshCw className="w-8 h-8" />
                            </div>
                            <h4 className="text-sm font-black text-amber-300 animate-pulse">大画面で最速・最遅を発表中...</h4>
                            <p className="text-[11px] text-slate-400">プロジェクターの発表をお待ちください！</p>
                          </div>
                        ) : (
                          <div className="bg-slate-950 p-4 rounded-xl space-y-1 border border-slate-800 animate-fade-in">
                            {isCorrectLocal ? (
                              <div>
                                <h4 className="text-base font-black text-emerald-400">ポイント加算完了！</h4>
                                <p className="text-[11px] text-slate-300">
                                  タイム順位に応じたポイント（最速15pt / 通常10pt / 最遅1pt）が加算されました！
                                </p>
                              </div>
                            ) : (
                              <div>
                                <h4 className="text-base font-black text-slate-500">ポイント加算なし (0pt)</h4>
                                <p className="text-[11px] text-slate-400">クイズ不正解、またはタイムアップ未回答でした。</p>
                              </div>
                            )}
                            <p className="text-[10px] text-slate-500 mt-2">※次の問題も続けて回答できます！</p>
                          </div>
                        )}
                      </div>
                    )}

                    {gameState.status === 'finished' && (
                      <div className="bg-slate-900 border-2 border-slate-800 rounded-2xl p-6 text-center space-y-3">
                        <h3 className="text-lg font-black text-yellow-400 animate-bounce">クイズ全問終了！</h3>
                        <p className="text-xs text-slate-400">最終順位発表を開始します！</p>
                      </div>
                    )}
                  </div>

                  <footer className="text-center text-[9px] text-slate-600 py-1 border-t border-slate-900 shrink-0">
                    © 2026 クイズサバイバル
                  </footer>
                </div>
              )}

            </div>
          </div>
        );
      }

      // 3. 主催者ホスト画面（pb-14等を追加し下部BOARDリストとの重なりを100%防止！）
      return (
        <div className="h-screen max-h-screen bg-slate-950 text-white flex flex-row p-0 overflow-hidden box-border">
          <div className="w-[80px] shrink-0 bg-slate-900/95 border-r border-slate-800 flex flex-col justify-between items-center py-4 z-50 h-full">
            <div className="flex flex-col items-center space-y-4 w-full px-1">
              <span className="text-[8px] font-black text-amber-500 tracking-wider text-center uppercase leading-tight">REMOTE</span>
              
              <div className="flex flex-col gap-2 w-full">
                <button 
                  onClick={startQuestion} 
                  disabled={gameState.status === 'reading_answering' || gameState.status === 'reveal_poll' || gameState.status === 'reveal_answer'} 
                  className="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded font-black text-[10px] disabled:opacity-20 text-center transition-all shadow"
                >
                  出題
                </button>
                <button 
                  onClick={stopAnsweringAndShowPoll} 
                  disabled={gameState.status !== 'reading_answering'} 
                  className="w-full py-2 bg-amber-500 text-slate-950 rounded font-black disabled:opacity-20 text-center text-[10px] transition-all shadow"
                >
                  締切
                </button>
                <button 
                  onClick={revealAnswer} 
                  disabled={gameState.status !== 'reveal_poll'} 
                  className="w-full py-2 bg-emerald-600 hover:bg-emerald-700 rounded font-black disabled:opacity-20 text-center text-[10px] transition-all shadow"
                >
                  正解
                </button>
                <button 
                  onClick={revealWorstAndDistributePoints} 
                  disabled={gameState.status !== 'reveal_answer'} 
                  className="w-full py-2 bg-rose-600 hover:bg-rose-500 rounded font-black disabled:opacity-20 text-center text-[10px] transition-all shadow"
                >
                  集計
                </button>
              </div>

              <div className="pt-2 border-t border-slate-800 w-full space-y-1.5 text-center">
                <span className="text-[8px] text-slate-500 font-bold block">TEST</span>
                <button onClick={addMockPlayers} className="w-full py-1 bg-slate-800 hover:bg-slate-700 rounded text-[9px] font-bold">AI追加</button>
                <button onClick={simulateMockAnswering} disabled={gameState.status !== 'reading_answering'} className="w-full py-1 bg-slate-800 hover:bg-slate-700 rounded disabled:opacity-20 text-[9px] font-bold">AI回答</button>
                <button onClick={clearMockPlayers} className="w-full py-1 bg-rose-950/20 text-rose-400 rounded text-[9px] font-bold">AI削除</button>
              </div>

              <div className="pt-2 border-t border-slate-800 w-full flex flex-col gap-1 text-[8px]">
                <button onClick={openQuestionEditor} className="w-full py-1 bg-slate-800 rounded font-bold">編集</button>
                <button onClick={resetGame} className="w-full py-1 bg-rose-950/20 text-rose-400 rounded font-bold">リセット</button>
              </div>
            </div>

            <div className="flex flex-col items-center gap-2 pt-2 border-t border-slate-800 w-full">
              <button onClick={() => setIsMuted(!isMuted)} className="w-7 h-7 rounded bg-slate-800 hover:bg-slate-700 text-xs flex items-center justify-center">
                {isMuted ? "🔇" : "🔊"}
              </button>
              <span className="text-[8px] text-slate-600">v3.1</span>
            </div>
          </div>

          {}
          {/* クイズメインモニターエリア：pb-14 を加えて画面最下部の参加者BOARDリストとの重なりを完全ガード！ */}
          <div className="flex-grow flex flex-col justify-between p-4 pl-6 pr-4 pb-14 max-h-screen overflow-hidden box-border">
            <div className="bg-slate-900/90 border-b-2 border-amber-500/30 p-3 rounded-xl flex justify-between items-center shadow-lg shrink-0">
              <div className="flex items-center space-x-3">
                <div className="bg-blue-600 p-1.5 rounded-lg border border-yellow-300 animate-pulse"><Zap className="w-5 h-5 text-yellow-300" /></div>
                <h1 className="text-lg md:text-xl font-black bg-gradient-to-r from-yellow-300 to-rose-400 bg-clip-text text-transparent">臨床検査技術学科 クイズバトル</h1>
              </div>
              <div className="text-right flex items-center space-x-4 font-mono text-sm">
                <span className="text-slate-400">問題: <b className="text-white text-base">{gameState.currentQIndex + 1} / {questions.length}</b></span>
                <span className="text-slate-400">回答数: <b className="text-white text-base">{answers.length}人</b></span>
              </div>
            </div>

            {gameState.status === 'reading_answering' && (
              <div className="bg-slate-900/40 p-2 rounded-xl border border-slate-800 shrink-0 animate-fade-in">
                <div className="flex justify-between items-center mb-1 font-mono text-xs text-slate-400">
                  <span>THINKING TIME (15.00s)</span>
                  <span className="text-3xl font-black text-yellow-400 lcd-number bg-black/80 px-3 py-0.5 rounded border border-yellow-500/20">{timeLeft.toFixed(2)}</span>
                </div>
                <div className="w-full bg-slate-950 h-5 rounded-full overflow-hidden border-2 border-slate-800 p-0.5">
                  <div className={`h-full rounded-full transition-all duration-75 ${getTimerColorClass()}`} style={{ width: `${timerPercentage}%` }} />
                </div>
              </div>
            )}

            <div className="flex-grow bg-slate-900/70 border-2 border-slate-800 rounded-2xl p-4 flex flex-col justify-center items-center relative overflow-hidden shadow-inner min-h-[200px] my-2">
              {gameState.status === 'reading_answering' && timeLeft > 13.5 && (
                <div className="absolute inset-0 bg-slate-950/95 flex items-center justify-center z-40">
                  <div className="bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-500 text-slate-950 font-black text-4xl md:text-6xl py-4 px-10 rounded-xl shadow-2xl border-4 border-white tracking-widest anonymity animate-banner">READY GO!</div>
                </div>
              )}

              {gameState.status !== 'reveal_worst' && gameState.status !== 'reveal_answer' && (
                <div className="text-center w-full max-w-4xl px-2 animate-fade-in">
                  <h2 className="text-xl md:text-3xl lg:text-4xl font-black text-yellow-100 leading-relaxed tracking-wide drop-shadow-md">
                    {currentQuestion ? currentQuestion.text : "問題が読み込まれるのを待っています..."}
                  </h2>
                </div>
              )}

              {gameState.status === 'reveal_answer' && currentQuestion && (
                <div className="w-full max-w-3xl flex flex-col justify-center items-center space-y-6 text-center animate-fade-in">
                  <span className="text-xs text-emerald-400 font-extrabold tracking-widest block uppercase">ANSWER CHECK (正解発表)</span>
                  <div className="space-y-4">
                    <p className="text-slate-400 text-sm font-bold">正解の番号は...</p>
                    <div className={`text-4xl md:text-7xl font-black text-emerald-400 py-6 px-10 border-4 border-emerald-500 rounded-3xl bg-emerald-500/10 inline-block max-w-full truncate shadow-2xl ${
                      isFlashingActive ? 'animate-flash' : 'border-dashed'
                    }`}>
                      {currentQuestion.answer + 1}. {currentQuestion.options[currentQuestion.answer]}
                    </div>
                  </div>
                  <p className="text-xs text-slate-400">早押しタイムによる配点集計発表（STEP 4）に移ります。</p>
                </div>
              )}

              {gameState.status === 'reveal_worst' && (
                <div className="w-full max-w-3xl flex flex-col justify-center items-center space-y-4 animate-fade-in">
                  {revealStage === 'showing_losers' && (
                    <div className="space-y-4 w-full">
                      <h3 className="text-base text-rose-400 font-extrabold uppercase flex items-center justify-center gap-1.5 animate-pulse">
                        早押しタイム集計発表中...
                      </h3>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 justify-center">
                        {visibleLosers.map((p, i) => (
                          <div key={p.id} className="bg-slate-900/95 border-2 border-slate-800 p-3 rounded-2xl flex flex-col items-center justify-center animate-fade-in shadow-md">
                            <span className="text-[10px] text-slate-400 font-bold mb-1">正解順位 下位 {11 - i}位</span>
                            <span className="text-xl md:text-2xl font-black text-white truncate w-full text-center">{p.name || ''}</span>
                            <span className="text-xs text-slate-400 font-mono mt-1 font-bold">{((p.time || 0) / 1000).toFixed(2)}秒</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {revealStage === 'waiting_worst' && (
                    <div className="space-y-2 text-center">
                      <h4 className="text-lg font-bold text-indigo-400 tracking-wider uppercase">早押し最遅決定まで...</h4>
                      <div className="text-8xl font-black text-indigo-500 font-mono animate-pulse drop-shadow-[0_0_20px_rgba(99,102,241,0.6)]">{countdownNum}</div>
                    </div>
                  )}

                  {revealStage === 'showing_worst' && (
                    <div className="flex flex-col space-y-4 items-center w-full">
                      {fastestPlayer && (
                        <div className="bg-gradient-to-br from-yellow-500/10 via-yellow-500/15 to-yellow-500/10 border border-yellow-500/30 p-3 rounded-xl text-center shadow-lg w-full max-w-lg">
                          <span className="text-xs text-yellow-300 font-black tracking-widest block uppercase font-bold">FASTEST CHAMPION (最速解答者 15pt)</span>
                          <h4 className="text-xl md:text-2xl font-black text-yellow-200 mt-1 truncate">{fastestPlayer.name} さん</h4>
                          <p className="text-xs text-slate-300 font-mono mt-0.5">早押しタイム: <b className="text-white font-bold">{((fastestPlayer.time || 0)/1000).toFixed(3)}</b> 秒</p>
                        </div>
                      )}

                      {worstPlayer && (
                        <div className="bg-slate-950 border-4 border-indigo-500 p-5 rounded-3xl text-center shadow-[0_0_35px_rgba(99,102,241,0.5)] w-full max-w-xl animate-fade-in">
                          <span className="text-xs text-indigo-400 font-black tracking-widest block uppercase font-bold">TOUCH OF THE DELAY (最遅正解者 1pt)</span>
                          <h4 className={`text-3xl md:text-6xl font-black text-indigo-300 mt-1 truncate ${isFlashingActive ? 'animate-flash' : ''}`}>
                            {worstPlayer.name} さん
                          </h4>
                          <p className="text-xs text-slate-400 mt-1 font-bold">早押しタイム: <b className="text-white text-base font-mono">{((worstPlayer.time || 0)/1000).toFixed(3)}</b> 秒</p>
                        </div>
                      )}
                    </div>
                  )}

                  {revealStage === 'idle' && !worstPlayer && (
                    <div className="text-center py-8 space-y-3">
                      <h4 className="text-2xl font-black text-rose-400">全員不正解！ (0pt)</h4>
                      <p className="text-sm text-slate-400">正解したプレイヤーがいませんでした。次の問題へ進みましょう！</p>
                    </div>
                  )}
                </div>
              )}
            </div>

            {}
            {/* 5選択肢パネル：余白と縦幅をすっきり調整して下部参加者リストとの被りを完全追放 */}
            {gameState.status !== 'reveal_worst' && gameState.status !== 'reveal_answer' ? (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-w-4xl mx-auto w-full shrink-0 animate-fade-in">
                {currentQuestion?.options.map((opt, oIdx) => {
                  const isCorrect = oIdx === currentQuestion.answer;
                  const isPollState = gameState.status === 'reveal_poll';
                  const isAnswerState = gameState.status === 'reveal_answer';
                  const choiceCount = answers.filter(a => a && a.selectedOption === oIdx).length;
                  const percentage = Math.round((choiceCount / (answers.length || 1)) * 100);

                  const colorClasses = [
                    'border-blue-500/30 bg-blue-950/20 text-blue-200', 'border-rose-500/30 bg-rose-950/20 text-rose-200',
                    'border-emerald-500/30 bg-emerald-950/20 text-emerald-200', 'border-yellow-500/30 bg-yellow-950/20 text-yellow-200',
                    'border-purple-500/30 bg-purple-950/20 text-purple-200'
                  ];

                  const isFlashingNow = isAnswerState && isCorrect && isFlashingActive;
                  const isStaticHighlightNow = isAnswerState && isCorrect && !isFlashingActive;

                  const highlightClass = isFlashingNow
                    ? 'border-emerald-500 bg-emerald-950/60 text-emerald-100 ring-4 ring-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.6)] animate-flash'
                    : isStaticHighlightNow
                    ? 'border-emerald-500 bg-emerald-950/5 text-emerald-100 ring-2 ring-emerald-500/60 border-dashed shadow-[0_0_25px_rgba(16,185,129,0.5)]'
                    : colorClasses[oIdx];

                  return (
                    <div key={oIdx} className={`p-2.5 rounded-xl border-2 relative overflow-hidden transition-all duration-300 ${highlightClass}`}>
                      {(isPollState || isAnswerState) && (
                        <div className={`absolute left-0 top-0 bottom-0 opacity-20 transition-all duration-1000 ${isAnswerState && isCorrect ? 'bg-emerald-500' : 'bg-blue-500'}`} style={{ width: `${percentage}%` }} />
                      )}
                      <div className="relative z-10 flex justify-between items-center text-sm md:text-base">
                        <span className="font-bold flex items-center space-x-2">
                          <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-black border ${isAnswerState && isCorrect ? 'bg-emerald-500 text-slate-950' : 'bg-slate-900'}`}>{oIdx + 1}</span>
                          <span>{opt}</span>
                        </span>
                        {(isPollState || isAnswerState) && (
                          <div className="flex items-center space-x-3 font-mono text-xs md:text-sm shrink-0">
                            <span className="text-slate-400 font-bold">{choiceCount}人</span>
                            <span className={`font-black ${isAnswerState && isCorrect ? 'text-emerald-400' : 'text-blue-400'}`}>{percentage}%</span>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : null}
          </div>

          {}
          {/* 問題編集モーダル */}
          {isEditingQuestions && (
            <div className="fixed inset-4 bg-slate-900/95 border-2 border-slate-800 rounded-2xl p-4 shadow-2xl flex flex-col justify-between z-50 animate-fade-in text-xs">
              <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                <h3 className="text-sm font-black text-indigo-400 flex items-center gap-1.5"><EditIcon className="w-4 h-4" /> 問題カスタマイズ作成・編集ボード</h3>
                <button onClick={() => setIsEditingQuestions(false)} className="text-slate-400 hover:text-white font-bold">✕ 閉じる</button>
              </div>
              <div className="grid grid-cols-4 gap-4 flex-grow my-3 overflow-hidden">
                <div className="col-span-1 border-r border-slate-800 pr-1 space-y-1 overflow-y-auto h-full no-scrollbar">
                  {questions.map((q, idx) => (
                    <button key={idx} onClick={() => { saveSelectedEdit(); loadQuestionToEdit(idx); }} className={`w-full text-left px-2 py-1.5 rounded text-[11px] font-bold transition-all truncate block ${selectedEditIndex === idx ? 'bg-indigo-600 text-white' : 'bg-slate-800/40'}`}>
                      {idx + 1}. {q.text || "(未入力)"}
                    </button>
                  ))}
                </div>
                <div className="col-span-3 space-y-3 overflow-y-auto h-full pr-1">
                  <div className="bg-slate-950 p-3 rounded-xl border border-slate-800 space-y-2">
                    <span className="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded font-bold">第 {selectedEditIndex + 1} 問</span>
                    <textarea value={editQuestionText} onChange={(e) => setEditQuestionText(e.target.value)} rows={2} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-xs text-white focus:outline-none" />
                    <div className="space-y-1.5">
                      {editOptions.map((opt, oIdx) => (
                        <div key={oIdx} className="flex items-center space-x-2">
                          <input type="text" value={opt} onChange={(e) => { const next = [...editOptions]; next[oIdx] = e.target.value; setEditOptions(next); }} className="flex-grow bg-slate-900 border border-slate-800 rounded p-1.5 text-xs text-white" />
                          <input type="radio" name="editRadio" checked={editAnswerIndex === oIdx} onChange={() => setEditAnswerIndex(oIdx)} className="w-4 h-4 text-indigo-600" />
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="flex justify-end"><button onClick={saveAllQuestionsToCloud} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-black shadow-md">クラウド変更保存＆全同期</button></div>
                </div>
              </div>
            </div>
          )}

          {/* 最下部固定参加者リスト（BOARD） */}
          <div className="bg-slate-900/90 border-t border-slate-800/80 p-1.5 rounded-xl flex items-center space-x-2 overflow-x-auto no-scrollbar max-h-[45px] box-border shrink-0 fixed bottom-1 right-4 left-24 z-30">
            <div className="flex items-center space-x-1.5 shrink-0 text-slate-500 text-[10px] font-black uppercase tracking-wider border-r border-slate-800 pr-2">
              <Users className="w-3.5 h-3.5 text-blue-400" /> <span>BOARD ({players.length})</span>
            </div>
            <div className="flex items-center space-x-1.5 overflow-x-auto no-scrollbar">
              {players.map((p, idx) => {
                if (!p?.id) return null;
                const ansObj = answers.find(a => a?.playerId === p.id);
                const answered = !!ansObj;

                return (
                  <div key={p.id} className={`px-2.5 py-0.5 rounded text-[11px] font-bold shrink-0 border transition-all flex items-center space-x-1 ${
                    answered && gameState.status === 'reading_answering' ? 'bg-blue-500/20 border-blue-400 text-blue-300' : 'bg-slate-800/50 border-transparent text-slate-300'
                  }`}>
                    <span>{idx+1}. {p.name}</span>
                    <span className="text-amber-400 font-mono text-[10px]">({p.score || 0})</span>
                  </div>
                );
              })}
            </div>
          </div>

          {}
          {/* ロビー */}
          {gameState.status === 'lobby' && !isEditingQuestions && (
            <div className="fixed inset-y-4 top-20 bottom-16 bg-slate-900 border-2 border-slate-800 rounded-3xl p-6 md:p-12 text-center flex flex-col justify-center items-center shadow-2xl z-20 animate-fade-in left-24 right-4">
              <div className="animate-pulse bg-blue-500/10 p-4 rounded-full border border-blue-500/20 mb-4">
                <Users className="w-12 h-12 text-blue-400" />
              </div>
              <div className="space-y-2 mb-6">
                <h3 className="text-2xl font-black">参加者エントリー待機中...</h3>
                <p className="text-slate-400 text-sm max-w-md">
                  現在、学生たちのスマートフォンからのアクセスを待っています。左下のURLを配布してニックネームを設定してもらってください。
                </p>
              </div>
              
              <div className="flex flex-col sm:flex-row gap-3 w-full max-w-md">
                <button 
                  onClick={startQuestion} 
                  disabled={players.length === 0} 
                  className="flex-1 px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 disabled:opacity-40 disabled:cursor-not-allowed text-white text-base font-black rounded-2xl shadow-lg transition-all"
                >
                  ゲームを開始する (第1問へ)
                </button>
                
                {players.length === 0 && (
                  <button 
                    onClick={addMockPlayers} 
                    className="flex-1 px-6 py-4 bg-amber-500 hover:bg-amber-600 text-slate-950 text-base font-black rounded-2xl shadow-lg transition-all animate-bounce"
                  >
                    💡 【テスト用】AI 30人追加して開始
                  </button>
                )}
              </div>
            </div>
          )}

          {/* 最終順位発表ステージ */}
          {gameState.status === 'finished' && (
            <div className="fixed inset-y-4 top-20 bottom-16 bg-slate-900 border-4 border-amber-500/50 rounded-3xl p-6 text-center flex flex-col justify-between items-center shadow-2xl z-40 animate-fade-in left-24 right-4 overflow-hidden">
              {!revealRankingActive ? (
                <div className="my-auto space-y-6 animate-fade-in">
                  <div className="text-6xl text-amber-400">👑</div>
                  <h3 className="text-3xl font-black tracking-widest bg-gradient-to-r from-yellow-300 via-amber-400 to-yellow-300 bg-clip-text text-transparent">
                    最終順位発表ステージ
                  </h3>
                  <p className="text-sm text-slate-400 max-w-md mx-auto">
                    ポイント集計が完了しました！大画面プロジェクターで下位（最大30位）から順に、ドラムロール演出とともに発表していきます。
                  </p>
                  <button 
                    onClick={startRankReveal}
                    className="px-10 py-4 bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-black text-lg rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-all"
                  >
                    順位発表スタート！
                  </button>
                </div>
              ) : (
                <div className="w-full h-full flex flex-col justify-between p-2 space-y-4">
                  <div>
                    <h3 className="text-lg font-black text-amber-400 tracking-wider">ALLSTAR CHAMPIONSHIP RANKING</h3>
                    <p className="text-xs text-slate-500 mt-0.5">下位（最大30名）から順番に1名ずつ発表されます</p>
                  </div>

                  <div className="flex-grow grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 overflow-y-auto no-scrollbar max-h-[55vh] py-2 border-y border-slate-800">
                    {[...players]
                      .sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0))
                      .slice(0, 30)
                      .map((p, idx) => {
                        const isRevealed = revealRankIndex === -1 || idx > revealRankIndex;
                        const rankNum = idx + 1;

                        if (!isRevealed) return null;

                        return (
                          <div 
                            key={p.id} 
                            className={`p-3 rounded-xl border flex justify-between items-center animate-fade-in transition-all ${
                              rankNum === 1 
                                ? 'bg-gradient-to-r from-yellow-500/20 via-amber-400/30 to-yellow-500/20 border-yellow-400 shadow-[0_0_20px_rgba(234,179,8,0.5)] ring-2 ring-yellow-400' 
                                : rankNum === 2
                                ? 'bg-slate-800/80 border-slate-400'
                                : rankNum === 3
                                ? 'bg-slate-900/90 border-amber-700/50'
                                : 'bg-slate-950/90 border-slate-800'
                            }`}
                          >
                            <span className="font-black text-sm">
                              {rankNum === 1 ? '🥇 優勝' : rankNum === 2 ? '🥈 2位' : rankNum === 3 ? '🥉 3位' : `${rankNum}位`}
                            </span>
                            <span className="font-extrabold truncate max-w-[120px] text-base">{p.name}</span>
                            <span className="text-amber-400 font-mono text-sm font-black">{p.score || 0}pt</span>
                          </div>
                        );
                      })}
                  </div>

                  <div className="flex justify-center items-center gap-4 py-2 shrink-0">
                    {revealRankIndex >= 0 ? (
                      <button 
                        onClick={revealNextRank}
                        className="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-black tracking-wider shadow-lg animate-bounce"
                      >
                        次の順位を発表 (残り {revealRankIndex + 1}名)
                      </button>
                    ) : (
                      <div className="space-y-3">
                        <p className="text-sm font-black text-emerald-400 animate-pulse">👑 最終順位発表完了！おめでとうございます！ 👑</p>
                        <button 
                          onClick={resetGame}
                          className="px-8 py-3.5 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-sm font-black tracking-wider shadow-lg"
                        >
                          ロビーに戻って最初から再戦する
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
